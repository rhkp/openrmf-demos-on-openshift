apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrmf-office.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "openrmf-office.labels" . | nindent 4 }}
    app.kubernetes.io/component: simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openrmf.lib.simulationSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openrmf.lib.simulationSelectorLabels" . | nindent 8 }}
        rmf.openrobotics.org/demo: {{ .Values.demo.name }}
    spec:
      serviceAccountName: {{ include "openrmf-office.serviceAccountName" . }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shm.sizeLimit }}
        - name: ros-logs
          emptyDir: {}
        - name: rmf-scripts
          configMap:
            name: {{ include "openrmf-office.fullname" . }}-scripts
            defaultMode: 0755
      containers:
        - name: simulation
          image: {{ required "image.fullRef is required" .Values.image.fullRef | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.robots.enabled }}
          # Robot-as-pod mode: launch world simulation only
          {{- if .Values.novnc.enabled }}
          command: ["/opt/rmf/scripts/launch-simulation-world-only-viz.sh"]
          {{- else }}
          command: ["/opt/rmf/scripts/launch-simulation-world-only.sh"]
          {{- end }}
          {{- else }}
          # Traditional mode: launch full simulation with robots
          {{- if .Values.novnc.enabled }}
          command: ["/opt/rmf/scripts/launch-simulation-viz.sh"]
          {{- else }}
          command: ["/opt/rmf/scripts/launch-simulation.sh"]
          {{- end }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- if .Values.robots.enabled }}
            # Robot-as-pod mode: reduced resources for world-only simulation
            {{- if .Values.novnc.enabled }}
            {{- toYaml .Values.resources.simulationWorldOnlyViz | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources.simulationWorldOnly | nindent 12 }}
            {{- end }}
            {{- else }}
            # Traditional mode: full simulation resources
            {{- if .Values.novnc.enabled }}
            {{- toYaml .Values.resources.simulationViz | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources.simulation | nindent 12 }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: ros-logs
              mountPath: /opt/rmf/.ros
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/ros-env.sh
              subPath: ros-env.sh
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/launch-simulation.sh
              subPath: launch-simulation.sh
            {{- if .Values.novnc.enabled }}
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/launch-simulation-viz.sh
              subPath: launch-simulation-viz.sh
            {{- end }}
            {{- if .Values.robots.enabled }}
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/launch-simulation-world-only.sh
              subPath: launch-simulation-world-only.sh
            {{- if .Values.novnc.enabled }}
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/launch-simulation-world-only-viz.sh
              subPath: launch-simulation-world-only-viz.sh
            {{- end }}
            {{- end }}
          env:
            - name: RMF_LAUNCH_FILE
              value: {{ .Values.demo.launchFile | quote }}
            {{- if .Values.robots.enabled }}
            - name: RMF_WORLD_NAME
              value: {{ .Values.demo.name | quote }}
            {{- end }}
            {{- if .Values.rmfWeb.enabled }}
            - name: RMF_SERVER_URI
              value: {{ .Values.rmfWeb.serverUri | quote }}
            {{- end }}
            {{- if .Values.zenoh.enabled }}
            - name: ZENOH_ROUTER_ENDPOINT
              value: {{ printf "tcp/%s-zenoh-router:%v" (include "openrmf-office.fullname" .) .Values.zenoh.port | quote }}
            {{- end }}
            {{- if not .Values.novnc.enabled }}
            - name: QT_QPA_PLATFORM
              value: offscreen
            - name: LIBGL_ALWAYS_SOFTWARE
              value: "1"
            {{- else }}
            - name: RMF_VNC_PORT
              value: {{ .Values.novnc.vncPort | quote }}
            - name: RMF_VNC_WIDTH
              value: {{ .Values.novnc.displayWidth | quote }}
            - name: RMF_VNC_HEIGHT
              value: {{ .Values.novnc.displayHeight | quote }}
            - name: LIBGL_ALWAYS_SOFTWARE
              value: "1"
            {{- end }}

        - name: fleet-monitor
          image: {{ .Values.image.fullRef | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/opt/rmf/scripts/run-fleet-monitor.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources.fleetMonitor | nindent 12 }}
          env:
            {{- if .Values.zenoh.enabled }}
            - name: ZENOH_ROUTER_ENDPOINT
              value: {{ printf "tcp/%s-zenoh-router:%v" (include "openrmf-office.fullname" .) .Values.zenoh.port | quote }}
            {{- end }}
          volumeMounts:
            - name: ros-logs
              mountPath: /opt/rmf/.ros
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/ros-env.sh
              subPath: ros-env.sh

        {{- if not .Values.robots.enabled }}
        # Traditional task dispatch (only in single-pod mode)
        - name: task-dispatch
          image: {{ .Values.image.fullRef | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [{{ .Values.dispatch.command | quote }}]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources.taskDispatch | nindent 12 }}
          env:
            - name: READY_WAIT_SECONDS
              value: {{ .Values.dispatch.readyWaitSeconds | quote }}
            {{- if .Values.zenoh.enabled }}
            - name: ZENOH_ROUTER_ENDPOINT
              value: {{ printf "tcp/%s-zenoh-router:%v" (include "openrmf-office.fullname" .) .Values.zenoh.port | quote }}
            {{- end }}
          volumeMounts:
            - name: ros-logs
              mountPath: /opt/rmf/.ros
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/ros-env.sh
              subPath: ros-env.sh
        {{- end }}

        {{- if .Values.robots.enabled }}
        # Robot-mode task dispatch — dispatches patrol to fleet adapter in robot pod
        - name: task-dispatch
          image: {{ .Values.image.fullRef | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [{{ .Values.dispatch.robotMode.command | quote }}]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources.taskDispatch | nindent 12 }}
          env:
            - name: READY_WAIT_SECONDS
              value: {{ .Values.dispatch.robotMode.readyWaitSeconds | quote }}
            {{- if .Values.zenoh.enabled }}
            - name: ZENOH_ROUTER_ENDPOINT
              value: {{ printf "tcp/%s-zenoh-router:%v" (include "openrmf-office.fullname" .) .Values.zenoh.port | quote }}
            {{- end }}
          volumeMounts:
            - name: ros-logs
              mountPath: /opt/rmf/.ros
            - name: rmf-scripts
              mountPath: /opt/rmf/scripts/ros-env.sh
              subPath: ros-env.sh
        {{- end }}

        {{- if .Values.novnc.enabled }}
        {{- include "openrmf.lib.novnc.containers" (list .) | nindent 8 }}
        {{- end }}
